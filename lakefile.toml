name = "Kaprekar4"
version = "0.1.0"
keywords = ["math"]
defaultTargets = ["Kaprekar4"]

[leanOptions]
pp.unicode.fun = true # pretty-prints `fun a ↦ b`
autoImplicit = false
relaxedAutoImplicit = false
weak.linter.mathlibStandardSet = true
maxSynthPendingDepth = 3


[[require]]
name = "mathlib"
scope = "leanprover-community"
rev = "v4.28.0"

[[lean_lib]]
name = "Kaprekar4"
globs = ["Kaprekar4.+"]
